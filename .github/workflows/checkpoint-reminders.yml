# Pushes a phone reminder (ntfy) on each dated SEO checkpoint from
# Dev/SEO/TASKS.md so the checkpoints don't depend on anyone remembering to
# open a Claude session. Crons repeat yearly, so each job is gated to 2026.
name: SEO checkpoint reminders

on:
  schedule:
    - cron: '0 8 25 7 *'   # Jul 25 — CP1 indexing
    - cron: '0 8 8 8 *'    # Aug 8  — CP2 topics
    - cron: '0 8 24 8 *'   # Aug 24 — batch 2 content due
    - cron: '0 8 5 9 *'    # Sep 5  — CP3 clicks
    - cron: '0 8 10 10 *'  # Oct 10 — 90-day verdict
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send checkpoint reminder
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ "$(date -u +%Y)" = "2026" ] || { echo "Not 2026; skipping."; exit 0; }
          case "$(date -u +%m-%d)" in
            07-25) MSG="SEO Checkpoint 1 (indexing) due today. Open Claude in Dev/SEO and say: run checkpoint 1. Expect: any impressions at all; zero = mechanical fix." ;;
            08-08) MSG="SEO Checkpoint 2 (topics) due today. Open Claude in Dev/SEO and say: run checkpoint 2. Which queries get impressions? Branded vs non-branded. Steers batch 2." ;;
            08-24) MSG="SEO batch 2 content due (~25 posts, queue running low). Open Claude in Dev/cong-le.com and follow PLAYBOOK 'Generating the next content batch'." ;;
            09-05) MSG="SEO Checkpoint 3 (clicks) due today. Open Claude in Dev/SEO and say: run checkpoint 3. Clicks should be non-trivial and growing; flat after wk 8 = rewrite titles." ;;
            10-10) MSG="SEO 90-day VERDICT due today. Open Claude in Dev/SEO and say: run the 90-day review. GSC + ct= downloads in ASC + refresh 5 oldest posts." ;;
            *) MSG="SEO checkpoint reminder (manual run)." ;;
          esac
          [ -n "$NTFY_TOPIC" ] && curl -s -H "Title: SEO checkpoint due" -H "Tags: calendar" -d "$MSG" "https://ntfy.sh/$NTFY_TOPIC" || echo "NTFY_TOPIC unset"

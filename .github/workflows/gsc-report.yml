name: Weekly search & store report

on:
  schedule:
    - cron: '0 8 * * 5'   # Fridays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ASC runs first so it writes seo-reports/asc/summary.json before the GSC
      # step sends its ntfy push (which appends the store numbers).
      - name: Generate App Store Connect report
        env:
          ASC_P8: ${{ secrets.ASC_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: node scripts/asc-weekly-report.mjs || echo "::warning::asc report failed"

      - name: Generate Search Console report
        env:
          GSC_SA_KEY: ${{ secrets.GSC_SA_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node scripts/gsc-weekly-report.mjs || echo "::warning::gsc report failed"

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seo-reports/
          git diff --cached --quiet || git commit -m "chore: weekly search console report"
          git push

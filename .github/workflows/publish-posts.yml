name: Publish queued blog post

on:
  schedule:
    - cron: '0 7 * * 1,4'  # Mondays and Thursdays at 7am UTC
  workflow_dispatch:         # Manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish next queued post
        run: node scripts/publish-next.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "blog: publish queued post

          Auto-published the next queued blog post and regenerated blog + sitemap."
          git push
